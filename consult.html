<!DOCTYPE html>
<html>
<head>
  <title>ปรึกษาผู้เชี่ยวชาญ AI</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; background-color: #f4f4f4; }
    .container { max-width: 800px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }
    h1 { color: #333; }
    textarea { width: 100%; height: 150px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; resize: vertical; box-sizing: border-box; }
    .button-group { display: flex; gap: 10px; margin-top: 10px; }
    .button-group button { flex-grow: 1; }
    button { padding: 10px 15px; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    button:hover { opacity: 0.9; }
    #response-box { margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 4px; background-color: #f9f9f9; white-space: pre-wrap; }
    
    /* --- VVV โค้ดที่อัปเดตสำหรับ Navigation Bar VVV --- */
    .nav { 
      display: flex;
      align-items: center;
      margin-bottom: 20px; 
      border-bottom: 1px solid #ccc; 
      padding-bottom: 10px; 
    }
    .nav a { margin-left: 15px; text-decoration: none; color: #007BFF; font-weight: bold; }
    .nav .logo { height: 40px; }
    .nav-links { margin-left: auto; }
    /* --- ^^^ สิ้นสุดโค้ดที่อัปเดต ^^^ --- */

    /* --- โค้ดสำหรับจอมือถือ --- */
    @media (max-width: 600px) {
      .button-group {
        flex-direction: column; /* สั่งให้ปุ่มเรียงเป็นแนวตั้ง */
      }
      body {
        margin: 10px;
      }
      .container {
        padding: 15px;
      }
      /* --- VVV เพิ่มโค้ดสำหรับ Nav บนมือถือ VVV --- */
      .nav {
        flex-direction: column; 
        align-items: flex-start;
      }
      .nav-links {
        margin-left: 0;
        margin-top: 10px;
      }
      /* --- ^^^ สิ้นสุดโค้ดที่เพิ่ม ^^^ --- */
    }

  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <img src="/images/logo.jpg" alt="In Cave AI Logo" class="logo">
      <div class="nav-links">
        <a href="/index.html">หน้าหลัก</a>
        <a href="/about.html">เกี่ยวกับเรา</a>
        <a href="/consult.html">ปรึกษาผู้เชี่ยวชาญ AI</a>
      </div>
    </div>
    <h1>ปรึกษาผู้เชี่ยวชาญ AI ด้านสุขภาพ</h1>
    <p>พิมพ์คำถามเกี่ยวกับสุขภาพหรือข้อสงสัยของคุณได้เลยครับ</p>
    
    <textarea id="question-input" placeholder="ตัวอย่าง: ฉันควรออกกำลังกายกี่ครั้งต่อสัปดาห์?"></textarea>
    
    <div class="button-group">
      <button id="submit-button" style="background-color: #007BFF;">ส่งคำถาม</button>
      <button id="clear-button" style="background-color: #6c757d;">ล้างข้อความ</button>
    </div>
    <div id="response-box">
      รอคำถามจากคุณ...
    </div>
  </div>

  <script>
    // ส่วนของปุ่ม "ส่งคำถาม"
    document.getElementById('submit-button').addEventListener('click', () => {
      const question = document.getElementById('question-input').value;
      if (question.trim() === '') {
        alert('กรุณาพิมพ์คำถามก่อนครับ');
        return;
      }
      
      const responseBox = document.getElementById('response-box');
      responseBox.innerText = 'กำลังประมวลผลคำตอบ...';

      fetch('/api/consult', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ question: question })
      })
      .then(response => {
        if (!response.ok) {
          throw new Error('Network response was not ok');
        }
        return response.json();
      })
      .then(data => {
        responseBox.innerText = data.answer;
      })
      .catch(error => {
        console.error('เกิดข้อผิดพลาด:', error);
        responseBox.innerText = 'เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่อีกครั้ง';
      });
    });

    // การทำงานของปุ่ม "ล้างข้อความ"
    document.getElementById('clear-button').addEventListener('click', () => {
      document.getElementById('question-input').value = '';
      document.getElementById('response-box').innerText = 'รอคำถามจากคุณ...';
    });
  </script>
</body>
</html>
