<!DOCTYPE html>
<html>
<head>
  <title>หน้าหลัก - เว็บไซต์ของเรา</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; background-color: #f4f4f4; }
    .container { max-width: 800px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }
    h1, h2 { color: #333; }
    .nav { margin-bottom: 20px; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
    .nav a { margin-right: 15px; text-decoration: none; color: #007BFF; font-weight: bold; }
    .nav a:hover { text-decoration: underline; }
    .section { margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 4px; background-color: #f9f9f9; }
    .product-list { display: flex; flex-wrap: wrap; gap: 20px; }
    .product { border: 1px solid #ccc; padding: 10px; border-radius: 4px; flex: 1 1 200px; box-sizing: border-box; text-align: center; }
    .product img { max-width: 100px; height: auto; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <a href="/index.html">หน้าหลัก</a>
      <a href="/about.html">เกี่ยวกับเรา</a>
      <a href="/consult.html">ปรึกษาผู้เชี่ยวชาญ AI</a>
    </div>

    <h1 id="welcome-message"></h1>
    <p>ยินดีต้อนรับสู่แอปสุขภาพของคุณ</p>

    <div id="health-summary-section" class="section">
      <h2 id="element-title"></h2>
      <p id="health-tips"></p>
    </div>

    <div id="related-products-section" class="section">
      <h2>สินค้าแนะนำสำหรับคุณ</h2>
      <div id="related-products-list" class="product-list"></div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      fetch('/api/summary')
        .then(response => response.json())
        .then(data => {
          document.getElementById('welcome-message').innerText = `สวัสดีครับคุณ${data.user_name}`;
          document.getElementById('element-title').innerText = `ธาตุประจำตัว: ${data.element}`;
          document.getElementById('health-tips').innerText = data.health_tips;

          const productList = document.getElementById('related-products-list');
          data.related_products.forEach(product => {
            const productElement = document.createElement('div');
            productElement.className = 'product';
            productElement.innerHTML = `
              <img src="${product.image_url}" alt="${product.name}">
              <h3>${product.name}</h3>
            `;
            productList.appendChild(productElement);
          });
        })
        .catch(error => {
          console.error('เกิดข้อผิดพลาดในการโหลดข้อมูล:', error);
          document.getElementById('welcome-message').innerText = 'ไม่สามารถโหลดข้อมูลได้';
        });
    });
  </script>
</body>
</html>
